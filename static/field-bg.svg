<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800" role="img" aria-label="Field background">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7ea"/>
      <stop offset="1" stop-color="#f0efe9"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f5f3a"/>
      <stop offset="1" stop-color="#6b8f3e"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1400" height="800" fill="url(#sky)"/>

  <!-- distant hills -->
  <path d="M0 420c180-120 360-140 540-60 170 75 330 70 480-15 160-92 280-80 380 35v420H0V420Z"
        fill="#2f5f3a" opacity="0.10" filter="url(#soft)"/>

  <!-- field stripes -->
  <g opacity="0.12">
    <path d="M-40 560c210-140 440-170 690-90 240 77 490 70 750-22l0 420H-40V560Z" fill="url(#field)"/>
    <path d="M-40 610c220-120 450-140 690-60 250 82 500 78 750-12l0 290H-40V610Z" fill="#2f5f3a" opacity="0.55"/>
    <path d="M-40 655c230-100 460-110 690-30 260 90 510 88 750-5l0 240H-40V655Z" fill="#6b8f3e" opacity="0.33"/>
  </g>

  <!-- rows -->
  <g stroke="#141c15" opacity="0.10" stroke-width="3">
    <path d="M-30 630c260-160 520-210 790-150 240 55 450 40 640-45"/>
    <path d="M-30 680c270-140 540-170 810-90 240 72 450 60 620-35"/>
    <path d="M-30 730c290-120 580-120 870 0 210 86 390 80 540-18"/>
  </g>

  <!-- sun -->
  <circle cx="1080" cy="170" r="70" fill="#6b8f3e" opacity="0.08" filter="url(#soft)"/>
  <circle cx="1080" cy="170" r="38" fill="#6b8f3e" opacity="0.10"/>
</svg>
