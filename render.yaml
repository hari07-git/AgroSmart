services:
  - type: web
    name: agrosmart
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: REQUIRE_EMAIL_OTP
        value: "1"
      - key: EMAIL_DELIVERY
        value: "smtp"
      - key: UPLOAD_FOLDER
        value: "/var/data/uploads"
      - key: MODEL_STORE
        value: "/var/data/models"
